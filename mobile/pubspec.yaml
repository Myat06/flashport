name: mobile
description: FlashPort — Offline-first customs document scanner for Cikarang Dry Port.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Document capture
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  # Local storage
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  # Network detection & HTTP
  connectivity_plus: ^6.1.1
  http: ^1.2.2
  # Image compression before upload
  flutter_image_compress: ^2.4.0
  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  # Push notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
